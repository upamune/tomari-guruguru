<style>
  html, body { margin: 0; padding: 0; height: 100%; }
  img { -webkit-user-drag: none; }
  @media (prefers-reduced-motion: no-preference) {
    .bob { animation: bob 3.4s ease-in-out infinite; }
    @keyframes bob {
      0%, 100% { translate: 0 0; }
      50% { translate: 0 -1.2vmin; }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.35; }
    }
  }
</style>
